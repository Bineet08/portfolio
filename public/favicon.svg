<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- System Boundary -->
  <rect 
    x="5" y="5" 
    width="90" height="90" 
    rx="15" 
    stroke="#374151" 
    stroke-width="2"
  />

  <!-- Stylized 'B' Logic Flow -->
  <path 
    d="M35 25V75M35 25H55C65 25 70 30 70 37.5C70 45 65 50 55 50M35 50H55C65 50 70 55 70 62.5C70 70 65 75 55 75H35" 
    stroke="#60a5fa" 
    stroke-width="6" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- Input Node -->
  <circle cx="50" cy="5" r="5" fill="#030712" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- Side Node -->
  <circle cx="5" cy="50" r="5" fill="#030712" stroke="#22d3ee" stroke-width="2"/>
  
  <!-- Output Node with Pulse Animation -->
  <circle cx="95" cy="50" r="5" fill="#030712" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="95" cy="50" r="8" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5">
    <animate 
      attributeName="r" 
      from="5" to="15" 
      dur="2s" 
      repeatCount="indefinite" 
    />
    <animate 
      attributeName="stroke-opacity" 
      from="0.8" to="0" 
      dur="2s" 
      repeatCount="indefinite" 
    />
  </circle>
</svg>
